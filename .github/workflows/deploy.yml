name: 自动部署到腾讯云

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # --- 新增的“大扫除”步骤 ---
      - name: 移除不需要的巨型文件 (防止传输卡死)
        run: rm -rf .git .github

      - name: 通过 SSH 部署文件
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "index.html,styles.css"
          target: "/opt/1panel/www/sites/luoqi2112.com/index"
          strip_components: 0
          overwrite: true
          timeout: 120s
